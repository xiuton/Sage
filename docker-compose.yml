version: '3.8'

services:
  sage-api:
    build: .
    container_name: sage-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - RUST_LOG=info
      - SAGE_API_KEY=your-secret-key
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sage-api-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: sage-api-gpu
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - RUST_LOG=info
      - SAGE_API_KEY=your-secret-key
    runtime: nvidia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
